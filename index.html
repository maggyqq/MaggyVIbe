<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0a0a0a,#141414);
color:white;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input{
padding:12px;
border-radius:12px;
border:none;
margin:6px;
background:#1c1c22;
color:white;
outline:none;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff2f92,#ff6ec7);
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #ff2f92;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

#app{
display:none;
height:100vh;
display:flex;
}

#sidebar{
width:260px;
background:rgba(20,20,25,0.9);
backdrop-filter:blur(10px);
border-right:1px solid #2a2a2c;
padding:10px;
}

.chatItem{
padding:12px;
border-radius:12px;
background:#1c1c22;
margin-bottom:6px;
cursor:pointer;
transition:0.2s;
}

.chatItem:hover{
background:#ff2f92;
}

#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

#chatHeader{
padding:15px;
border-bottom:1px solid #2a2a2c;
font-size:18px;
font-weight:bold;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msgRow{
display:flex;
margin-bottom:12px;
}

.message{
position:relative;
max-width:65%;
padding:12px;
border-radius:14px;
cursor:pointer;
}

.me{
background:linear-gradient(45deg,#ff2f92,#ff6ec7);
margin-left:auto;
}

.other{
background:#1f1f25;
}

.time{
position:absolute;
bottom:5px;
right:10px;
font-size:10px;
opacity:0.6;
}

.reactions{
margin-top:6px;
font-size:14px;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:6px;
color:white;
}

#inputArea{
display:flex;
padding:10px;
border-top:1px solid #2a2a2c;
}

#messageInput{
flex:1;
}

#users{
margin-top:20px;
border-top:1px solid #333;
padding-top:10px;
}

.user{
padding:6px;
cursor:pointer;
display:flex;
align-items:center;
}

.user:hover{
color:#ff2f92;
}

.userDot{
width:10px;
height:10px;
border-radius:50%;
margin-right:6px;
}

</style>

</head>

<body>

<div id="login">

<h2>Maggy Vibe</h2>

<input id="codeInput" placeholder="Secret code">
<input id="usernameInput" placeholder="Nickname">

<p>Цвет аватарки</p>
<input type="color" id="avatarColor" value="#ff2f92">

<button onclick="enter()">Enter</button>

</div>

<div id="app">

<div id="sidebar">

<h3>Chats</h3>
<div id="chatList"></div>

<div id="users">
<h4>Users</h4>
<div id="userList"></div>
</div>

</div>

<div id="chatWindow">

<div id="chatHeader">Select chat</div>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB2XCUvOiNF4Lpy3ZSYN6rlXjMy1pNLL2M",
authDomain:"maggyvibeqq.firebaseapp.com",
projectId:"maggyvibeqq",
storageBucket:"maggyvibeqq.firebasestorage.app",
messagingSenderId:"576302427084",
appId:"1:576302427084:web:64464bfc7926f180a90b69"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const secretCode="MAGGY2026";

let username=localStorage.getItem("maggyUser")||"";
let avatarColorLocal=localStorage.getItem("maggyAvatar")||"#ff2f92";
let currentChat=null;

if(username) startApp();

function enter(){

let code=codeInput.value;
let name=usernameInput.value;
let color=avatarColor.value;

if(code!==secretCode) return alert("Wrong code");
if(!name) return alert("Enter nickname");

username=name;
avatarColorLocal=color;

localStorage.setItem("maggyUser",username);
localStorage.setItem("maggyAvatar",color);

db.collection("users").doc(username).set({
avatar:color
});

startApp();
}

function startApp(){

login.style.display="none";
app.style.display="flex";

setOnline();
watchUsers();
loadChats();

}

function getChatId(a,b){
return [a,b].sort().join("_");
}

function openChat(user){

currentChat=getChatId(username,user);
chatHeader.innerText=user;

loadMessages();
}

function sendMessage(){

let text=messageInput.value.trim();
if(!text||!currentChat) return;

db.collection("messages").add({
chatId:currentChat,
sender:username,
text:text,
time:Date.now(),
reactions:[],
avatar:avatarColorLocal
});

db.collection("chats").doc(currentChat).set({
users:currentChat.split("_"),
last:text,
time:Date.now()
});

messageInput.value="";
}

function reactToMessage(id){

let emoji=prompt("Введите реакцию: ❤️ 😂 🔥");

if(!emoji) return;

let ref=db.collection("messages").doc(id);

ref.get().then(doc=>{
let r=doc.data().reactions||[];
r.push(emoji);
ref.update({reactions:r});
});

}

function loadMessages(){

db.collection("messages")
.where("chatId","==",currentChat)

.onSnapshot(snapshot=>{

let arr=[];

snapshot.forEach(doc=>{
arr.push({...doc.data(), id:doc.id});
});

arr.sort((a,b)=>a.time-b.time);

let html="";

arr.forEach(m=>{

let cls=m.sender===username?"me":"other";

let avatarLetter=m.sender[0].toUpperCase();
let avatarColor=m.avatar || "#ff2f92";

let date=new Date(m.time);
let t=date.getHours()+":"+String(date.getMinutes()).padStart(2,"0");

let reactions=(m.reactions||[]).join(" ");

html+=`
<div class="msgRow">
<div class="avatar" style="background:${avatarColor}">
${avatarLetter}
</div>

<div class="message ${cls}" onclick="reactToMessage('${m.id}')">
<b>${m.sender}</b><br>
${m.text}
<div class="time">${t}</div>
<div class="reactions">${reactions}</div>
</div>
</div>
`;

});

messages.innerHTML=html;
messages.scrollTop=messages.scrollHeight;

});
}

function loadChats(){

db.collection("chats")
.where("users","array-contains",username)

.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{
let users=doc.data().users;
let other=users.find(u=>u!==username);

html+=`<div class="chatItem" onclick="openChat('${other}')">${other}</div>`;
});

chatList.innerHTML=html;

});
}

function watchUsers(){

db.collection("online").onSnapshot(snapshot=>{

let now=Date.now();
userList.innerHTML="";

snapshot.forEach(doc=>{

let u=doc.id;
let data=doc.data();

if(u!==username){

let online=(now-data.time<30000);

db.collection("users").doc(u).get().then(userDoc=>{

let color="#ff2f92";
if(userDoc.exists){
color=userDoc.data().avatar;
}

userList.innerHTML+=`
<div class="user" onclick="openChat('${u}')">
<div class="userDot" style="background:${color}"></div>
${online?"🟢":"⚫"} ${u}
</div>
`;

});

}

});

});
}

function setOnline(){

function update(){
db.collection("online").doc(username).set({
time:Date.now()
});
}

update();
setInterval(update,20000);

}

</script>

</body>
</html>
