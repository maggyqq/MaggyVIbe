<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* MOBILE FIX */
#app{
display:none;
height:100vh;
display:flex;
overflow:hidden;
}

#sidebar{
width:260px;
background:#121214;
padding:10px;
overflow-y:auto;
}

#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

/* MOBILE MODE */
@media(max-width:700px){

#sidebar{
position:absolute;
width:100%;
height:100%;
z-index:2;
}

#chatWindow{
width:100%;
}

}

/* TOP */
#topBar{
padding:10px;
border-bottom:1px solid #333;
display:flex;
align-items:center;
gap:10px;
}

#backBtn{
display:none;
cursor:pointer;
}

@media(max-width:700px){
#backBtn{display:block;}
}

/* MESSAGES */
#messages{
flex:1;
overflow-y:auto;
padding:15px;
scroll-behavior:smooth;
}

.row{
display:flex;
margin-bottom:10px;
}

.message{
position:relative;
padding:10px;
border-radius:12px;
max-width:70%;
cursor:pointer;
}

.me{
background:#ff2f92;
margin-left:auto;
}

.other{
background:#1f1f25;
}

.time{
font-size:10px;
opacity:0.6;
text-align:right;
}

.reply{
font-size:12px;
opacity:0.6;
border-left:2px solid #ff2f92;
padding-left:5px;
margin-bottom:5px;
}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
border-top:1px solid #333;
position:sticky;
bottom:0;
background:#0a0a0a;
}

#messageInput{
flex:1;
}

</style>

</head>

<body>

<div id="login">
<h2>Maggy Vibe</h2>
<input id="codeInput">
<input id="usernameInput">
<button onclick="enter()">Enter</button>
</div>

<div id="app">

<div id="sidebar">
<h3>Search</h3>
<input id="searchBox">
<button onclick="searchUser()">Find</button>
<div id="searchResult"></div>
</div>

<div id="chatWindow">

<div id="topBar">
<span id="backBtn" onclick="goBack()">⬅️</span>
<div id="chatHeader">No chat</div>
<span id="status"></span>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"maggyvibeqq.firebaseapp.com",
projectId:"maggyvibeqq"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const secretCode="MAGGY2026";

let username=localStorage.getItem("maggyUser")||"";
let currentChat=null;
let replyTo=null;

if(username) startApp();

/* LOGIN */
function enter(){

let code=codeInput.value;
let name=usernameInput.value.trim();

if(code!==secretCode)return alert("Wrong code");

username=name;
localStorage.setItem("maggyUser",name);

startApp();
}

/* START */
function startApp(){
login.style.display="none";
app.style.display="flex";
}

/* SEARCH */
function searchUser(){

let name=searchBox.value.trim();

searchResult.innerHTML=
`<button onclick="openChat('${name}')">${name}</button>`;
}

/* CHAT */
function getChatId(a,b){
return[a,b].sort().join("_");
}

function openChat(user){

currentChat=getChatId(username,user);
chatHeader.innerText=user;

if(window.innerWidth<700){
sidebar.style.display="none";
}

loadMessages();
}

/* BACK */
function goBack(){
sidebar.style.display="block";
}

/* SEND */
function sendMessage(){

let text=messageInput.value.trim();
if(!text||!currentChat)return;

db.collection("messages").add({
chatId:currentChat,
sender:username,
text,
time:Date.now(),
reply:replyTo||null
});

messageInput.value="";
replyTo=null;
}

/* ENTER SEND */
messageInput.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* LOAD */
function loadMessages(){

db.collection("messages")
.where("chatId","==",currentChat)

.onSnapshot(s=>{

let arr=[];
s.forEach(doc=>arr.push(doc.data()));
arr.sort((a,b)=>a.time-b.time);

let html="";

arr.forEach(m=>{

let cls=m.sender===username?"me":"other";

let d=new Date(m.time);
let time=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");

html+=`
<div class="row">

<div class="message ${cls}" onclick="messageMenu('${m.text}')">

${m.reply?`<div class="reply">${m.reply}</div>`:""}

${m.text}

<div class="time">${time}</div>

</div>
</div>
`;

});

messages.innerHTML=html;
messages.scrollTop=messages.scrollHeight;

});
}

/* MENU */
function messageMenu(text){

let action=prompt("1 Reply 2 Copy");

if(action==="1"){
replyTo=text;
alert("Replying...");
}

if(action==="2"){
navigator.clipboard.writeText(text);
alert("Copied!");
}

}

</script>

</body>
</html>
