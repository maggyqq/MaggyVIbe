<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input{
padding:12px;
border-radius:12px;
border:none;
margin:6px;
background:#1c1c22;
color:white;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#ff2f92;
color:white;
cursor:pointer;
}

#app{
display:none;
height:100vh;
display:flex;
}

#sidebar{
width:260px;
background:#121214;
padding:10px;
}

#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

#topBar{
padding:10px;
border-bottom:1px solid #333;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.row{
display:flex;
margin-bottom:10px;
}

.message{
padding:10px;
border-radius:12px;
max-width:60%;
cursor:pointer;
}

.me{
background:#ff2f92;
margin-left:auto;
}

.other{
background:#1f1f25;
}

.avatar{
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:6px;
}

#inputArea{
display:flex;
padding:10px;
border-top:1px solid #333;
}

#messageInput{
flex:1;
}

</style>

</head>

<body>

<div id="login">
<h2>Maggy Vibe</h2>

<input id="codeInput" placeholder="Secret code">
<input id="usernameInput" placeholder="Username">
<input type="color" id="avatarColor">

<button onclick="enter()">Enter</button>
</div>

<div id="app">

<div id="sidebar">
<h3>Search</h3>
<input id="searchBox">
<button onclick="searchUser()">Find</button>
<div id="searchResult"></div>
</div>

<div id="chatWindow">

<div id="topBar">
<div id="chatHeader">No chat</div>
<div id="status"></div>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB2XCUvOiNF4Lpy3ZSYN6rlXjMy1pNLL2M",
authDomain:"maggyvibeqq.firebaseapp.com",
projectId:"maggyvibeqq"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const secretCode="MAGGY2026";

let username=localStorage.getItem("maggyUser")||"";
let avatarColorLocal=localStorage.getItem("maggyAvatar")||"#ff2f92";
let currentChat=null;
let currentUserWatching=null;

if(username) startApp();

/* LOGIN */
function enter(){

let code=codeInput.value;
let name=usernameInput.value.trim();
let color=avatarColor.value;

if(code!==secretCode) return alert("Wrong code");

db.collection("users").doc(name).get().then(doc=>{
if(doc.exists){
alert("Username taken");
return;
}

db.collection("users").doc(name).set({avatar:color});

username=name;
avatarColorLocal=color;

localStorage.setItem("maggyUser",name);
localStorage.setItem("maggyAvatar",color);

startApp();
});

}

/* START */
function startApp(){

login.style.display="none";
app.style.display="flex";

setOnline();

}

/* ONLINE */
function setOnline(){

function update(){
db.collection("online").doc(username).set({
time:Date.now()
});
}

update();
setInterval(update,15000);

}

/* SEARCH */
function searchUser(){

let name=searchBox.value.trim();

db.collection("users").doc(name).get().then(doc=>{

if(!doc.exists){
searchResult.innerHTML="Not found";
return;
}

searchResult.innerHTML=
`<button onclick="openChat('${name}')">${name}</button>`;

});

}

/* CHAT */
function getChatId(a,b){
return[a,b].sort().join("_");
}

function openChat(user){

currentChat=getChatId(username,user);
currentUserWatching=user;

chatHeader.innerText=user;

watchStatus(user);
loadMessages();

}

/* STATUS */
function watchStatus(user){

db.collection("online").doc(user)
.onSnapshot(doc=>{

if(!doc.exists){
status.innerText="Offline";
return;
}

let t=doc.data().time;
let now=Date.now();

if(now-t<20000){
status.innerText="🟢 Online";
}else{
let d=new Date(t);
status.innerText="Last seen: "+d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
}

});

}

/* SEND */
function sendMessage(){

let text=messageInput.value.trim();
if(!text||!currentChat)return;

db.collection("messages").add({
chatId:currentChat,
sender:username,
text,
time:Date.now(),
avatar:avatarColorLocal
});

messageInput.value="";
}

/* EDIT / DELETE */
function messageAction(id, currentText){

let action=prompt("1 = Edit, 2 = Delete");

if(action==="1"){

let newText=prompt("Edit message:", currentText);
if(!newText)return;

db.collection("messages").doc(id).update({
text:newText
});

}

if(action==="2"){

db.collection("messages").doc(id).delete();

}

}

/* LOAD */
function loadMessages(){

db.collection("messages")
.where("chatId","==",currentChat)

.onSnapshot(s=>{

let arr=[];

s.forEach(doc=>{
arr.push({...doc.data(), id:doc.id});
});

arr.sort((a,b)=>a.time-b.time);

let html="";

arr.forEach(m=>{

let cls=m.sender===username?"me":"other";

html+=`
<div class="row">
<div class="avatar" style="background:${m.avatar}">
${m.sender[0]}
</div>

<div class="message ${cls}" onclick="${m.sender===username ? `messageAction('${m.id}','${m.text}')` : ''}">
<b>${m.sender}</b><br>
${m.text}
</div>
</div>
`;

});

messages.innerHTML=html;

});

}

</script>

</body>
</html>
