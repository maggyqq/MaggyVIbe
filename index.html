<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

/* PROFILE MODAL */
#profileModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

#profileBox{
background:#1c1c22;
padding:20px;
border-radius:12px;
text-align:center;
}

/* INPUT */
input{
padding:10px;
margin:6px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

/* BUTTON */
button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#ff2f92;
color:white;
cursor:pointer;
}

/* APP */
#app{
display:none;
height:100vh;
display:flex;
}

/* SIDEBAR */
#sidebar{
width:250px;
background:#121214;
padding:10px;
}

.user{
cursor:pointer;
padding:6px;
}

/* CHAT */
#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
padding:10px;
margin-bottom:10px;
border-radius:10px;
max-width:60%;
}

.me{
background:#ff2f92;
margin-left:auto;
}

.other{
background:#222;
}

/* HEADER */
#topBar{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Maggy Vibe</h2>

<input id="codeInput" placeholder="Secret code">
<input id="usernameInput" placeholder="Username (unique)">
<input type="color" id="avatarColor" value="#ff2f92">

<button onclick="enter()">Enter</button>
</div>

<!-- PROFILE -->
<div id="profileModal">
<div id="profileBox">
<h3>Profile</h3>

<p id="profileName"></p>

<input type="color" id="newColor">

<br><br>

<button onclick="saveProfile()">Save</button>
<button onclick="closeProfile()">Close</button>

</div>
</div>

<!-- APP -->
<div id="app">

<div id="sidebar">
<h3>Users</h3>
<div id="userList"></div>
</div>

<div id="chatWindow">

<div id="topBar">
<div id="chatHeader">Select chat</div>
<button onclick="openProfile()">Profile</button>
</div>

<div id="messages"></div>

<div>
<input id="messageInput">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB2XCUvOiNF4Lpy3ZSYN6rlXjMy1pNLL2M",
authDomain:"maggyvibeqq.firebaseapp.com",
projectId:"maggyvibeqq"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const secretCode="MAGGY2026";

let username=localStorage.getItem("maggyUser")||"";
let avatarColorLocal=localStorage.getItem("maggyAvatar")||"#ff2f92";
let currentChat=null;

if(username) startApp();

/* LOGIN */
function enter(){

let code=codeInput.value;
let name=usernameInput.value.trim();
let color=avatarColor.value;

if(code!==secretCode) return alert("Wrong code");
if(!name) return alert("Enter username");

// 🔥 ПРОВЕРКА УНИКАЛЬНОСТИ
db.collection("users").doc(name).get().then(doc=>{

if(doc.exists){
alert("Username already taken");
return;
}

// создаём пользователя
db.collection("users").doc(name).set({
avatar:color
});

username=name;
avatarColorLocal=color;

localStorage.setItem("maggyUser",name);
localStorage.setItem("maggyAvatar",color);

startApp();

});

}

/* PROFILE */
function openProfile(){

profileModal.style.display="flex";
profileName.innerText=username;
newColor.value=avatarColorLocal;

}

function closeProfile(){
profileModal.style.display="none";
}

function saveProfile(){

let color=newColor.value;

db.collection("users").doc(username).update({
avatar:color
});

avatarColorLocal=color;
localStorage.setItem("maggyAvatar",color);

alert("Saved!");
}

/* APP */
function startApp(){

login.style.display="none";
app.style.display="flex";

watchUsers();
setOnline();
}

function getChatId(a,b){
return[a,b].sort().join("_");
}

function openChat(user){
currentChat=getChatId(username,user);
chatHeader.innerText=user;
loadMessages();
}

/* SEND */
function sendMessage(){

let text=messageInput.value.trim();
if(!text||!currentChat)return;

db.collection("messages").add({
chatId:currentChat,
sender:username,
text,
time:Date.now(),
avatar:avatarColorLocal
});

messageInput.value="";
}

/* LOAD */
function loadMessages(){

db.collection("messages").onSnapshot(s=>{

let html="";

s.forEach(doc=>{
let m=doc.data();

if(m.chatId!==currentChat)return;

let cls=m.sender===username?"me":"other";

html+=`
<div class="message ${cls}">
<b>${m.sender}</b><br>
${m.text}
</div>
`;

});

messages.innerHTML=html;

});
}

/* USERS */
function watchUsers(){

db.collection("users").onSnapshot(s=>{

let html="";

s.forEach(doc=>{

let u=doc.id;

if(u!==username){

html+=`<div class="user" onclick="openChat('${u}')">${u}</div>`;
}

});

userList.innerHTML=html;

});
}

/* ONLINE */
function setOnline(){

setInterval(()=>{
db.collection("online").doc(username).set({
time:Date.now()
});
},20000);

}

</script>

</body>
</html>
