<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

/* SETTINGS */
#settingsModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
z-index:5;
}

#settingsBox{
background:#1c1c22;
padding:20px;
border-radius:14px;
width:260px;
text-align:center;
}

/* INPUT */
input, textarea{
padding:12px;
border-radius:12px;
border:none;
margin:6px;
background:#1c1c22;
color:white;
width:90%;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#ff2f92;
color:white;
cursor:pointer;
}

/* APP */
#app{
display:none;
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:260px;
background:#121214;
padding:10px;
overflow-y:auto;
}

.chatItem{
padding:10px;
border-radius:10px;
background:#1c1c22;
margin-bottom:6px;
cursor:pointer;
}

.chatItem:hover{
background:#ff2f92;
}

/* MOBILE */
@media(max-width:700px){
#sidebar{
position:absolute;
width:100%;
height:100%;
z-index:2;
}
}

/* CHAT */
#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

#topBar{
padding:10px;
border-bottom:1px solid #333;
display:flex;
justify-content:space-between;
align-items:center;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
}

/* MESSAGE */
.row{
display:flex;
margin-bottom:10px;
}

.message{
position:relative;
padding:10px;
border-radius:12px;
max-width:70%;
cursor:pointer;
}

.me{
background:#ff2f92;
margin-left:auto;
}

.other{
background:#1f1f25;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:6px;
font-weight:bold;
}

.time{
position:absolute;
bottom:4px;
right:8px;
font-size:10px;
opacity:0.6;
}

.reactions{
margin-top:6px;
}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
border-top:1px solid #333;
gap:5px;
}

#messageInput{
flex:1;
}

/* MOBILE FIX SEND */
@media(max-width:700px){
#inputArea{
padding:8px;
}
#messageInput{
font-size:16px;
}
button{
padding:10px;
}
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Maggy Vibe</h2>

<input id="codeInput" placeholder="Code">
<input id="usernameInput" placeholder="Username">
<input type="color" id="avatarColor">

<button onclick="enter()">Enter</button>
</div>

<!-- SETTINGS -->
<div id="settingsModal">
<div id="settingsBox">
<h3>Settings</h3>

<p id="profileName"></p>

<input type="color" id="profileColor">
<textarea id="profileBio" placeholder="Bio"></textarea>

<button onclick="saveProfile()">Save</button>
<button onclick="closeSettings()">Close</button>

</div>
</div>

<!-- APP -->
<div id="app">

<div id="sidebar">

<h3>Chats</h3>
<div id="chatList"></div>

<hr>

<h3>Search</h3>
<input id="searchBox">
<button onclick="searchUser()">Find</button>
<div id="searchResult"></div>

</div>

<div id="chatWindow">

<div id="topBar">
<div id="chatHeader">No chat</div>
<div>
<span id="status"></span>
<button onclick="openSettings()">⚙️</button>
</div>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"maggyvibeqq.firebaseapp.com",
projectId:"maggyvibeqq"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const secretCode="MAGGY2026";

let username=localStorage.getItem("maggyUser")||"";
let avatarColorLocal=localStorage.getItem("maggyAvatar")||"#ff2f92";
let currentChat=null;

if(username) startApp();

/* LOGIN */
function enter(){

let code=codeInput.value;
let name=usernameInput.value.trim();
let color=avatarColor.value;

if(code!==secretCode) return alert("Wrong code");

db.collection("users").doc(name).get().then(doc=>{
if(doc.exists) return alert("Taken");

db.collection("users").doc(name).set({
avatar:color,
bio:""
});

username=name;
avatarColorLocal=color;

localStorage.setItem("maggyUser",name);
localStorage.setItem("maggyAvatar",color);

startApp();
});

}

/* SETTINGS */
function openSettings(){
settingsModal.style.display="flex";
profileName.innerText=username;
profileColor.value=avatarColorLocal;

db.collection("users").doc(username).get().then(doc=>{
profileBio.value=doc.data().bio||"";
});
}

function closeSettings(){
settingsModal.style.display="none";
}

function saveProfile(){

let color=profileColor.value;
let bio=profileBio.value;

db.collection("users").doc(username).update({
avatar:color,
bio:bio
});

avatarColorLocal=color;
localStorage.setItem("maggyAvatar",color);

alert("Saved");
}

/* START */
function startApp(){

login.style.display="none";
app.style.display="flex";

loadChats();
}

/* SEARCH */
function searchUser(){

let name=searchBox.value.trim();

db.collection("users").doc(name).get().then(doc=>{
if(!doc.exists){
searchResult.innerHTML="Not found";
return;
}

searchResult.innerHTML=
`<button onclick="openChat('${name}')">${name}</button>`;
});

}

/* CHAT */
function getChatId(a,b){
return[a,b].sort().join("_");
}

function openChat(user){

currentChat=getChatId(username,user);
chatHeader.innerText=user;

loadMessages();
}

/* SEND */
function sendMessage(){

let text=messageInput.value.trim();
if(!text||!currentChat)return;

db.collection("messages").add({
chatId:currentChat,
sender:username,
text,
time:Date.now(),
avatar:avatarColorLocal,
reactions:[]
});

db.collection("chats").doc(currentChat).set({
users:currentChat.split("_"),
last:text,
time:Date.now()
});

messageInput.value="";
}

/* LOAD CHATS */
function loadChats(){

db.collection("chats")
.where("users","array-contains",username)
.orderBy("time","desc")
.onSnapshot(s=>{

let html="";

s.forEach(doc=>{
let data=doc.data();
let other=data.users.find(u=>u!==username);

html+=`
<div class="chatItem" onclick="openChat('${other}')">
<b>${other}</b><br>
${data.last||""}
</div>
`;
});

chatList.innerHTML=html;

});
}

/* LOAD MESSAGES */
function loadMessages(){

db.collection("messages")
.where("chatId","==",currentChat)
.onSnapshot(s=>{

let arr=[];

s.forEach(doc=>{
arr.push({...doc.data(), id:doc.id});
});

arr.sort((a,b)=>a.time-b.time);

let html="";

arr.forEach(m=>{

let cls=m.sender===username?"me":"other";

let d=new Date(m.time);
let time=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");

let reactions=(m.reactions||[]).join(" ");

html+=`
<div class="row">
<div class="avatar" style="background:${m.avatar}">
${m.sender[0]}
</div>

<div class="message ${cls}" onclick="react('${m.id}')">
<b>${m.sender}</b><br>
${m.text}

<div class="time">${time}</div>
<div class="reactions">${reactions}</div>

</div>
</div>
`;

});

messages.innerHTML=html;
messages.scrollTop=messages.scrollHeight;

});

}

/* REACTIONS */
function react(id){

let emoji=prompt("❤️ 😂 🔥");

if(!emoji) return;

let ref=db.collection("messages").doc(id);

ref.get().then(doc=>{
let r=doc.data().reactions||[];
r.push(emoji);
ref.update({reactions:r});
});

}

</script>

</body>
</html>
