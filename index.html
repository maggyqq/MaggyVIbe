<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe v7</title>

<style>

body{
margin:0;
font-family:-apple-system,Arial;
background:#0b0b0d;
color:white;
}

/* LAYOUT */
#app{
display:flex;
height:100vh;
}

/* SIDEBAR */
#sidebar{
width:300px;
background:#111;
border-right:1px solid #222;
overflow-y:auto;
}

/* CHAT ITEM */
.chatItem{
display:flex;
padding:10px;
cursor:pointer;
border-bottom:1px solid #1a1a1a;
}

.chatItem:hover{
background:#1c1c22;
}

.chatAvatar{
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:10px;
font-weight:bold;
}

.chatInfo{
flex:1;
}

.chatTop{
display:flex;
justify-content:space-between;
font-size:14px;
}

.chatLast{
font-size:12px;
opacity:0.6;
}

/* CHAT */
#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

#topBar{
padding:10px;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
}

/* PINNED */
#pinned{
background:#1c1c22;
padding:8px;
display:none;
font-size:12px;
}

/* MESSAGES */
#messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.row{
display:flex;
margin-bottom:10px;
}

.message{
max-width:65%;
padding:10px;
border-radius:14px;
position:relative;
cursor:pointer;
}

.me{
background:#2b5278;
margin-left:auto;
}

.other{
background:#1f1f25;
}

.time{
font-size:10px;
opacity:0.6;
text-align:right;
}

.status{
font-size:10px;
text-align:right;
}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
border-top:1px solid #222;
gap:5px;
}

#messageInput{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#1c1c22;
color:white;
}

button{
background:#2b5278;
border:none;
color:white;
padding:10px;
border-radius:20px;
}

/* SETTINGS */
#settings{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

#settingsBox{
background:#1c1c22;
padding:20px;
border-radius:12px;
text-align:center;
}

</style>

</head>

<body>

<div id="app">

<div id="sidebar">
<div id="chatList"></div>
</div>

<div id="chatWindow">

<div id="topBar">
<div id="chatHeader">Select chat</div>
<div><button onclick="openSettings()">⚙️</button></div>
</div>

<div id="pinned"></div>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<!-- SETTINGS -->
<div id="settings">
<div id="settingsBox">
<h3>Profile</h3>
<input type="color" id="profileColor"><br>
<button onclick="saveProfile()">Save</button>
<button onclick="closeSettings()">Close</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"maggyvibeqq.firebaseapp.com",
projectId:"maggyvibeqq"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let username=localStorage.getItem("maggyUser")||prompt("Username?");
let avatarColorLocal=localStorage.getItem("maggyAvatar")||"#2b5278";
let currentChat=null;

/* SETTINGS */
function openSettings(){
settings.style.display="flex";
profileColor.value=avatarColorLocal;
}

function closeSettings(){
settings.style.display="none";
}

function saveProfile(){
avatarColorLocal=profileColor.value;
localStorage.setItem("maggyAvatar",avatarColorLocal);
}

/* CHAT ID */
function getChatId(a,b){
return[a,b].sort().join("_");
}

/* OPEN CHAT */
function openChat(user){

currentChat=getChatId(username,user);
chatHeader.innerText=user;

markAsRead();
loadMessages();

}

/* SEND */
function sendMessage(){

let text=messageInput.value.trim();
if(!text||!currentChat)return;

db.collection("messages").add({
chatId:currentChat,
sender:username,
text,
time:Date.now(),
read:false,
reactions:[]
});

db.collection("chats").doc(currentChat).set({
users:currentChat.split("_"),
last:text,
time:Date.now()
});

messageInput.value="";
}

/* READ */
function markAsRead(){

db.collection("messages")
.where("chatId","==",currentChat)
.get()
.then(s=>{

s.forEach(doc=>{
let d=doc.data();

if(d.sender!==username && !d.read){
db.collection("messages").doc(doc.id).update({read:true});
}

});

});

}

/* PIN */
function pinMessage(text){
db.collection("chats").doc(currentChat).update({
pinned:text
});
}

/* ACTION */
function messageAction(id,text){

let action=prompt("1=React 2=Pin");

if(action==="1"){

let emoji=prompt("❤️ 😂 🔥");
if(!emoji)return;

let ref=db.collection("messages").doc(id);

ref.get().then(doc=>{
let r=doc.data().reactions||[];
r.push(emoji);
ref.update({reactions:r});
});

}

if(action==="2"){
pinMessage(text);
}

}

/* LOAD CHATS */
function loadChats(){

db.collection("chats")
.where("users","array-contains",username)
.orderBy("time","desc")
.onSnapshot(s=>{

let html="";

s.forEach(doc=>{
let d=doc.data();
let other=d.users.find(u=>u!==username);

html+=`
<div class="chatItem" onclick="openChat('${other}')">
<b>${other}</b><br>
${d.last||""}
</div>
`;
});

chatList.innerHTML=html;

});
}

/* LOAD MESSAGES */
function loadMessages(){

db.collection("messages")
.where("chatId","==",currentChat)
.onSnapshot(s=>{

let arr=[];

s.forEach(doc=>{
arr.push({...doc.data(), id:doc.id});
});

arr.sort((a,b)=>a.time-b.time);

let html="";

arr.forEach(m=>{

let cls=m.sender===username?"me":"other";

let t=new Date(m.time).getHours()+":"+
String(new Date(m.time).getMinutes()).padStart(2,"0");

let statusMark=m.sender===username?(m.read?"✔️✔️":"✔️"):"";

let reactions=(m.reactions||[]).join(" ");

html+=`
<div class="row">
<div class="message ${cls}" onclick="messageAction('${m.id}','${m.text}')">
${m.text}

<div class="time">${t}</div>
<div class="status">${statusMark}</div>
<div>${reactions}</div>

</div>
</div>
`;

});

/* PINNED */
db.collection("chats").doc(currentChat).get().then(doc=>{
if(doc.exists && doc.data().pinned){
pinned.style.display="block";
pinned.innerText="📌 "+doc.data().pinned;
}else{
pinned.style.display="none";
}
});

messages.innerHTML=html;
messages.scrollTop=messages.scrollHeight;

});

}

/* ENTER SEND */
messageInput.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* START */
loadChats();

</script>

</body>
</html>
