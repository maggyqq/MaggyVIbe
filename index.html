<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0c;
color:white;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input{
padding:12px;
border-radius:10px;
border:none;
margin:6px;
background:#1a1a1d;
color:white;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#ff2f92;
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 10px #ff2f92;
}

#app{
display:none;
height:100vh;
display:flex;
}

#sidebar{
width:260px;
background:#121214;
border-right:1px solid #222;
padding:10px;
overflow-y:auto;
}

.chatItem{
padding:12px;
border-radius:10px;
background:#1b1b1f;
margin-bottom:6px;
cursor:pointer;
transition:0.2s;
}

.chatItem:hover{
background:#ff2f92;
}

#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

#chatHeader{
padding:15px;
border-bottom:1px solid #222;
font-weight:bold;
font-size:18px;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msgRow{
display:flex;
align-items:flex-end;
margin-bottom:10px;
}

.message{
max-width:65%;
padding:10px;
border-radius:12px;
}

.me{
background:#ff2f92;
margin-left:auto;
}

.other{
background:#1f1f23;
}

.time{
font-size:10px;
opacity:0.6;
margin-top:4px;
}

.avatar{
width:34px;
height:34px;
border-radius:50%;
background:#ff2f92;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:6px;
}

#inputArea{
display:flex;
padding:10px;
border-top:1px solid #222;
}

#messageInput{
flex:1;
}

.user{
padding:6px;
cursor:pointer;
}

.online{
color:#00ff9f;
}

.offline{
color:#666;
}

</style>

</head>

<body>

<div id="login">

<h2>Maggy Vibe</h2>

<input id="codeInput" placeholder="Secret code">
<input id="usernameInput" placeholder="Nickname">

<button onclick="enter()">Enter</button>

</div>

<div id="app">

<div id="sidebar">

<h3>Chats</h3>
<div id="chatList"></div>

<h4>Users</h4>
<div id="userList"></div>

</div>

<div id="chatWindow">

<div id="chatHeader">Select chat</div>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB2XCUvOiNF4Lpy3ZSYN6rlXjMy1pNLL2M",
authDomain:"maggyvibeqq.firebaseapp.com",
projectId:"maggyvibeqq",
storageBucket:"maggyvibeqq.firebasestorage.app",
messagingSenderId:"576302427084",
appId:"1:576302427084:web:64464bfc7926f180a90b69"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const secretCode="MAGGY2026";

let username=localStorage.getItem("maggyUser")||"";
let currentChat=null;

if(username) startApp();

function enter(){

let code=codeInput.value;
let name=usernameInput.value;

if(code!==secretCode) return alert("Wrong code");
if(!name) return alert("Enter nickname");

username=name;
localStorage.setItem("maggyUser",username);

startApp();
}

function startApp(){

login.style.display="none";
app.style.display="flex";

setOnline();
watchUsers();
loadChats();

Notification.requestPermission();
}

function getChatId(a,b){
return [a,b].sort().join("_");
}

function openChat(user){

currentChat=getChatId(username,user);
chatHeader.innerText=user;

loadMessages();
}

function sendMessage(){

let text=messageInput.value.trim();
if(!text||!currentChat) return;

db.collection("messages").add({
chatId:currentChat,
sender:username,
text:text,
time:Date.now()
});

db.collection("chats").doc(currentChat).set({
users:currentChat.split("_"),
last:text,
time:Date.now()
});

messageInput.value="";
}

function loadMessages(){

db.collection("messages")
.where("chatId","==",currentChat)
.orderBy("time")

.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let m=doc.data();
let cls=m.sender===username?"me":"other";
let avatar=m.sender[0].toUpperCase();

let date=new Date(m.time);
let t=date.getHours()+":"+String(date.getMinutes()).padStart(2,"0");

html+=`
<div class="msgRow">
<div class="avatar">${avatar}</div>
<div class="message ${cls}">
<b>${m.sender}</b><br>
${m.text}
<div class="time">${t}</div>
</div>
</div>
`;

});

messages.innerHTML=html;
messages.scrollTop=messages.scrollHeight;

});
}

function loadChats(){

db.collection("chats")
.where("users","array-contains",username)

.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{
let users=doc.data().users;
let other=users.find(u=>u!==username);

html+=`<div class="chatItem" onclick="openChat('${other}')">${other}</div>`;
});

chatList.innerHTML=html;

});
}

function watchUsers(){

db.collection("online").onSnapshot(snapshot=>{

let now=Date.now();
let html="";

snapshot.forEach(doc=>{

let u=doc.id;
let data=doc.data();

if(u!==username){

let online=(now-data.time<30000);

html+=`
<div class="user ${online?"online":"offline"}" onclick="openChat('${u}')">
${online?"🟢":"⚫"} ${u}
</div>
`;

}

});

userList.innerHTML=html;

});
}

function setOnline(){

function update(){
db.collection("online").doc(username).set({
time:Date.now()
});
}

update();
setInterval(update,20000);

window.addEventListener("beforeunload",()=>{
db.collection("online").doc(username).delete();
});

}

</script>

</body>
</html>
