<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#profileModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

#profileBox{
background:#1c1c22;
padding:20px;
border-radius:12px;
text-align:center;
}

input{
padding:12px;
border-radius:12px;
border:none;
margin:6px;
background:#1c1c22;
color:white;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#ff2f92;
color:white;
cursor:pointer;
}

#app{
display:none;
height:100vh;
display:flex;
}

#sidebar{
width:260px;
background:#121214;
padding:10px;
}

#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

#topBar{
padding:10px;
border-bottom:1px solid #333;
display:flex;
justify-content:space-between;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.row{
display:flex;
margin-bottom:10px;
}

.message{
position:relative;
padding:10px;
border-radius:12px;
max-width:60%;
cursor:pointer;
}

.me{
background:#ff2f92;
margin-left:auto;
}

.other{
background:#1f1f25;
}

.avatar{
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:6px;
}

.time{
position:absolute;
bottom:4px;
right:8px;
font-size:10px;
opacity:0.6;
}

.reactions{
margin-top:6px;
font-size:14px;
}

#inputArea{
display:flex;
padding:10px;
border-top:1px solid #333;
}

#messageInput{
flex:1;
}

img{
max-width:200px;
border-radius:10px;
margin-top:5px;
}

</style>

</head>

<body>

<div id="login">
<h2>Maggy Vibe</h2>

<input id="codeInput" placeholder="Code">
<input id="usernameInput" placeholder="Username">
<input type="color" id="avatarColor">

<button onclick="enter()">Enter</button>
</div>

<div id="profileModal">
<div id="profileBox">
<h3>Profile</h3>
<p id="profileName"></p>
<input type="color" id="profileColor">
<br><br>
<button onclick="saveProfile()">Save</button>
<button onclick="closeProfile()">Close</button>
</div>
</div>

<div id="app">

<div id="sidebar">
<h3>Search</h3>
<input id="searchBox">
<button onclick="searchUser()">Find</button>
<div id="searchResult"></div>
</div>

<div id="chatWindow">

<div id="topBar">
<div id="chatHeader">No chat</div>
<div>
<span id="status"></span>
<button onclick="openProfile()">Profile</button>
</div>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput">
<input type="file" id="fileInput">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB2XCUvOiNF4Lpy3ZSYN6rlXjMy1pNLL2M",
authDomain:"maggyvibeqq.firebaseapp.com",
projectId:"maggyvibeqq",
storageBucket:"maggyvibeqq.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const storage=firebase.storage();

const secretCode="MAGGY2026";

let username=localStorage.getItem("maggyUser")||"";
let avatarColorLocal=localStorage.getItem("maggyAvatar")||"#ff2f92";
let currentChat=null;

if(username) startApp();

/* LOGIN */
function enter(){

let code=codeInput.value;
let name=usernameInput.value.trim();
let color=avatarColor.value;

if(code!==secretCode) return alert("Wrong code");

db.collection("users").doc(name).get().then(doc=>{
if(doc.exists){
alert("Username taken");
return;
}

db.collection("users").doc(name).set({avatar:color});

username=name;
avatarColorLocal=color;

localStorage.setItem("maggyUser",name);
localStorage.setItem("maggyAvatar",color);

startApp();
});

}

/* PROFILE */
function openProfile(){
profileModal.style.display="flex";
profileName.innerText=username;
profileColor.value=avatarColorLocal;
}

function closeProfile(){
profileModal.style.display="none";
}

function saveProfile(){

let color=profileColor.value;

db.collection("users").doc(username).update({avatar:color});

avatarColorLocal=color;
localStorage.setItem("maggyAvatar",color);

alert("Saved!");
}

/* START */
function startApp(){

login.style.display="none";
app.style.display="flex";

setOnline();
Notification.requestPermission();

}

/* ONLINE */
function setOnline(){

setInterval(()=>{
db.collection("online").doc(username).set({time:Date.now()});
},15000);

}

/* SEARCH */
function searchUser(){

let name=searchBox.value.trim();

db.collection("users").doc(name).get().then(doc=>{

if(!doc.exists){
searchResult.innerHTML="Not found";
return;
}

searchResult.innerHTML=
`<button onclick="openChat('${name}')">${name}</button>`;

});

}

/* CHAT */
function getChatId(a,b){
return[a,b].sort().join("_");
}

function openChat(user){

currentChat=getChatId(username,user);
chatHeader.innerText=user;

watchStatus(user);
watchTyping();
loadMessages();

}

/* STATUS */
function watchStatus(user){

db.collection("online").doc(user)
.onSnapshot(doc=>{

if(!doc.exists){
status.innerText="Offline";
return;
}

let t=doc.data().time;
let now=Date.now();

if(now-t<20000){
status.innerText="🟢 Online";
}else{
let d=new Date(t);
status.innerText="Last seen: "+d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
}

});

}

/* TYPING */
let typingTimeout;

messageInput.addEventListener("input",()=>{

db.collection("typing").doc(currentChat+"_"+username).set({
user:username,
time:Date.now()
});

clearTimeout(typingTimeout);

typingTimeout=setTimeout(()=>{
db.collection("typing").doc(currentChat+"_"+username).delete();
},2000);

});

function watchTyping(){

db.collection("typing").onSnapshot(s=>{

let arr=[];

s.forEach(doc=>{
let d=doc.data();
if(d.user!==username && doc.id.startsWith(currentChat)){
arr.push(d.user);
}
});

if(arr.length>0){
status.innerText=arr.join(", ")+" typing...";
}

});

}

/* SEND */
function sendMessage(){

let text=messageInput.value.trim();
if(!text||!currentChat)return;

db.collection("messages").add({
chatId:currentChat,
sender:username,
text,
time:Date.now(),
avatar:avatarColorLocal,
reactions:[]
});

messageInput.value="";
}

/* PHOTO */
fileInput.addEventListener("change", async ()=>{

let file=fileInput.files[0];
if(!file||!currentChat)return;

let ref=storage.ref("images/"+Date.now()+"_"+file.name);

await ref.put(file);

let url=await ref.getDownloadURL();

db.collection("messages").add({
chatId:currentChat,
sender:username,
image:url,
time:Date.now(),
avatar:avatarColorLocal,
reactions:[]
});

});

/* ACTION */
function messageAction(id,text){

let action=prompt("1=Edit 2=Delete 3=React");

if(action==="1"){
let newText=prompt("Edit:",text);
if(newText){
db.collection("messages").doc(id).update({text:newText});
}
}

if(action==="2"){
db.collection("messages").doc(id).delete();
}

if(action==="3"){
let emoji=prompt("❤️ 😂 🔥");
if(!emoji)return;

let ref=db.collection("messages").doc(id);

ref.get().then(doc=>{
let r=doc.data().reactions||[];
r.push(emoji);
ref.update({reactions:r});
});
}

}

/* LOAD */
function loadMessages(){

db.collection("messages")
.where("chatId","==",currentChat)

.onSnapshot(s=>{

let arr=[];

s.forEach(doc=>{
arr.push({...doc.data(), id:doc.id});
});

arr.sort((a,b)=>a.time-b.time);

let html="";

arr.forEach(m=>{

let cls=m.sender===username?"me":"other";

let d=new Date(m.time);
let time=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");

let content=m.text?m.text:`<img src="${m.image}">`;

if(document.hidden && m.sender!==username){
new Notification(m.sender,{body:m.text||"📷 Photo"});
}

let reactions=(m.reactions||[]).join(" ");

html+=`
<div class="row">
<div class="avatar" style="background:${m.avatar}">
${m.sender[0]}
</div>

<div class="message ${cls}" onclick="messageAction('${m.id}','${m.text||""}')">
<b>${m.sender}</b><br>
${content}

<div class="time">${time}</div>
<div class="reactions">${reactions}</div>

</div>
</div>
`;

});

messages.innerHTML=html;

});

}

</script>

</body>
</html>
