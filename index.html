<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f10;
color:white;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#app{
display:none;
height:100vh;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin:6px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#ff4da6;
color:white;
font-weight:bold;
cursor:pointer;
}

#app{
display:flex;
}

#sidebar{
width:280px;
background:#161618;
border-right:1px solid #2a2a2c;
padding:10px;
overflow-y:auto;
}

.chatItem{
padding:10px;
border-radius:8px;
background:#1d1d20;
margin-bottom:6px;
cursor:pointer;
}

.chatItem:hover{
background:#2a2a2e;
}

#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

#chatHeader{
padding:15px;
border-bottom:1px solid #2a2a2c;
font-weight:bold;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:60%;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.me{
background:#ff4da6;
margin-left:auto;
}

.other{
background:#262629;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
background:#ff4da6;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:6px;
}

#inputArea{
display:flex;
padding:10px;
border-top:1px solid #2a2a2c;
}

#messageInput{
flex:1;
}

#users{
margin-top:20px;
border-top:1px solid #333;
padding-top:10px;
}

.user{
padding:6px;
cursor:pointer;
}

.user:hover{
color:#ff4da6;
}

</style>

</head>

<body>

<div id="login">

<h2>Maggy Vibe</h2>

<p>Secret code</p>
<input id="codeInput">

<p>Nickname</p>
<input id="usernameInput">

<button onclick="enter()">Enter</button>

</div>

<div id="app">

<div id="sidebar">

<h2>Chats</h2>

<div id="chatList"></div>

<div id="users">
<h3>Users</h3>
<div id="userList"></div>
</div>

</div>

<div id="chatWindow">

<div id="chatHeader">
Select chat
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 ТВОЙ FIREBASE УЖЕ ВСТАВЛЕН
const firebaseConfig={
apiKey: "AIzaSyB2XCUvOiNF4Lpy3ZSYN6rlXjMy1pNLL2M",
authDomain: "maggyvibeqq.firebaseapp.com",
projectId: "maggyvibeqq",
storageBucket: "maggyvibeqq.firebasestorage.app",
messagingSenderId: "576302427084",
appId: "1:576302427084:web:64464bfc7926f180a90b69"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const secretCode="MAGGY2026";

let username=localStorage.getItem("maggyUser")||"";
let currentChat=null;

if(username){
startApp();
}

function enter(){

let code=document.getElementById("codeInput").value;
let name=document.getElementById("usernameInput").value;

if(code!==secretCode){
alert("Wrong code");
return;
}

if(!name){
alert("Enter nickname");
return;
}

username=name;
localStorage.setItem("maggyUser",username);

startApp();
}

function startApp(){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";

setOnline();
watchUsers();
loadChats();

Notification.requestPermission();
}

function getChatId(a,b){
return [a,b].sort().join("_");
}

function openChat(user){

currentChat=getChatId(username,user);

document.getElementById("chatHeader").innerText=user;

loadMessages();
}

function sendMessage(){

let text=document.getElementById("messageInput").value;

if(!text){
return;
}

if(!currentChat){
alert("Выбери чат");
return;
}

db.collection("messages").add({
chatId:currentChat,
sender:username,
text:text,
time:Date.now()
});

db.collection("chats").doc(currentChat).set({
users:currentChat.split("_"),
last:text,
time:Date.now()
});

document.getElementById("messageInput").value="";
}

function loadMessages(){

db.collection("messages")
.where("chatId","==",currentChat)

.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let m=doc.data();
let cls=m.sender===username?"me":"other";
let avatar=m.sender.charAt(0).toUpperCase();

html+=`
<div style="display:flex;align-items:center;">
<div class="avatar">${avatar}</div>
<div class="message ${cls}">
<b>${m.sender}</b><br>
${m.text}
</div>
</div>
`;

if(m.sender!==username && Notification.permission==="granted"){
new Notification(m.sender,{body:m.text});
}

});

document.getElementById("messages").innerHTML=html;

let box=document.getElementById("messages");
box.scrollTop=box.scrollHeight;

});
}

function loadChats(){

db.collection("chats")
.where("users","array-contains",username)

.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let users=doc.data().users;
let other=users.find(u=>u!==username);

html+=`<div class="chatItem" onclick="openChat('${other}')">${other}</div>`;

});

document.getElementById("chatList").innerHTML=html;

});
}

function watchUsers(){

db.collection("online")
.onSnapshot(snapshot=>{

let html="";
let now=Date.now();

snapshot.forEach(doc=>{

let u=doc.id;
let data=doc.data();

if(u!==username){

let status=(now-data.time<30000)?"🟢":"⚫️";

html+=`<div class="user" onclick="openChat('${u}')">
${status} ${u}
</div>`;

}

});

document.getElementById("userList").innerHTML=html;

});
}

function setOnline(){

db.collection("online").doc(username).set({
time:Date.now()
});

setInterval(()=>{
db.collection("online").doc(username).set({
time:Date.now()
});
},20000);

}

</script>

</body>
</html>
