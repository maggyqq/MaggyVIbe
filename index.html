<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggy Vibe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0c;
color:white;
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input{
padding:12px;
border-radius:10px;
border:none;
margin:6px;
background:#1a1a1d;
color:white;
}

/* BUTTON */
button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#ff2f92;
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 10px #ff2f92;
}

/* APP */
#app{
display:none;
height:100vh;
display:flex;
}

/* SIDEBAR */
#sidebar{
width:260px;
background:#121214;
border-right:1px solid #222;
padding:10px;
}

/* CHAT */
#chatWindow{
flex:1;
display:flex;
flex-direction:column;
}

#chatHeader{
padding:15px;
border-bottom:1px solid #222;
font-weight:bold;
}

/* MESSAGES */
#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
position:relative;
max-width:65%;
padding:10px;
border-radius:12px;
margin-bottom:12px;
cursor:pointer;
}

.me{
background:#ff2f92;
margin-left:auto;
}

.other{
background:#1f1f23;
}

.time{
font-size:10px;
opacity:0.6;
position:absolute;
bottom:5px;
right:10px;
}

/* REACTIONS */
.reactions{
margin-top:5px;
font-size:14px;
}

/* TYPING */
#typing{
font-size:12px;
opacity:0.7;
padding:5px 20px;
}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
border-top:1px solid #222;
}

#messageInput{
flex:1;
}

/* USERS */
.user{
cursor:pointer;
padding:6px;
}

</style>

</head>

<body>

<div id="login">
<h2>Maggy Vibe</h2>
<input id="codeInput" placeholder="Secret code">
<input id="usernameInput" placeholder="Nickname">
<button onclick="enter()">Enter</button>
</div>

<div id="app">

<div id="sidebar">
<h3>Users</h3>
<div id="userList"></div>
</div>

<div id="chatWindow">

<div id="chatHeader">Select chat</div>

<div id="messages"></div>
<div id="typing"></div>

<div id="inputArea">
<input id="messageInput" oninput="typing()" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB2XCUvOiNF4Lpy3ZSYN6rlXjMy1pNLL2M",
authDomain:"maggyvibeqq.firebaseapp.com",
projectId:"maggyvibeqq"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const secretCode="MAGGY2026";

let username=localStorage.getItem("maggyUser")||"";
let currentChat=null;
let typingTimeout;

if(username) startApp();

function enter(){
if(codeInput.value!==secretCode) return alert("Wrong code");
if(!usernameInput.value) return alert("Enter nickname");

username=usernameInput.value;
localStorage.setItem("maggyUser",username);
startApp();
}

function startApp(){
login.style.display="none";
app.style.display="flex";
watchUsers();
setOnline();
}

/* USERS */
function watchUsers(){
db.collection("online").onSnapshot(s=>{
let html="";
let now=Date.now();

s.forEach(doc=>{
let u=doc.id;
let online=(now-doc.data().time<30000);
if(u!==username){
html+=`<div class="user" onclick="openChat('${u}')">${online?"🟢":"⚫"} ${u}</div>`;
}
});

userList.innerHTML=html;
});
}

/* CHAT */
function getChatId(a,b){
return[a,b].sort().join("_");
}

function openChat(user){
currentChat=getChatId(username,user);
chatHeader.innerText=user;
loadMessages();
watchTyping();
}

/* SEND */
function sendMessage(){

let text=messageInput.value.trim();
if(!text||!currentChat) return;

db.collection("messages").add({
chatId:currentChat,
sender:username,
text,
time:Date.now(),
reactions:[]
});

messageInput.value="";
}

/* LOAD */
function loadMessages(){

db.collection("messages").onSnapshot(s=>{

let arr=[];

s.forEach(doc=>{
let m=doc.data();
if(m.chatId===currentChat) arr.push({...m,id:doc.id});
});

arr.sort((a,b)=>a.time-b.time);

let html="";

arr.forEach(m=>{

let cls=m.sender===username?"me":"other";
let time=new Date(m.time).toLocaleTimeString().slice(0,5);

let reactions=m.reactions.map(r=>r).join(" ");

html+=`
<div class="message ${cls}" onclick="react('${m.id}')">
<b>${m.sender}</b><br>
${m.text}
<div class="time">${time}</div>
<div class="reactions">${reactions}</div>
</div>
`;

});

messages.innerHTML=html;
messages.scrollTop=messages.scrollHeight;

});
}

/* REACTIONS */
function react(id){

let emoji=prompt("Реакция (❤️ 😂 🔥)");

if(!emoji) return;

let ref=db.collection("messages").doc(id);

ref.get().then(doc=>{
let r=doc.data().reactions||[];
r.push(emoji);
ref.update({reactions:r});
});

}

/* TYPING */
function typing(){

if(!currentChat) return;

db.collection("typing").doc(currentChat+"_"+username).set({
time:Date.now()
});

clearTimeout(typingTimeout);

typingTimeout=setTimeout(()=>{
db.collection("typing").doc(currentChat+"_"+username).delete();
},2000);

}

function watchTyping(){

db.collection("typing").onSnapshot(s=>{

let html="";

s.forEach(doc=>{
let d=doc.id;

if(d.includes(currentChat) && !d.includes(username)){
let user=d.split("_")[1];
html=`${user} печатает...`;
}
});

typing.innerText=html;

});

}

/* ONLINE */
function setOnline(){

function update(){
db.collection("online").doc(username).set({time:Date.now()});
}

update();
setInterval(update,20000);

}

</script>

</body>
</html>
