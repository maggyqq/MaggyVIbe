<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maggy Vibe</title>
<link rel="manifest" href="manifest.json">
<style>
body{
  font-family:Arial;
  background:#0f0f10;
  color:white;
  text-align:center;
  padding:20px;
}
input{
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#ff4da6;
  color:white;
  font-weight:bold;
}
#chat{display:none}
#messages{
  max-width:500px;
  margin:auto;
  text-align:left;
  margin-top:20px;
}
.message{
  background:#1b1b1d;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  gap:10px;
}
.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#ff4da6;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}
.username{
  color:#ff4da6;
  font-weight:bold;
}
.online-user{
  display:inline-block;
  margin-right:5px;
}
.chat-toggle{
  margin-top:10px;
  display:inline-block;
  cursor:pointer;
  color:#ff4da6;
  font-weight:bold;
}
</style>
</head>
<body>

<h1>Maggy Vibe</h1>

<!-- Экран ввода секретного кода -->
<div id="codeScreen">
  <p>Введите секретный код</p>
  <input id="codeInput">
  <br>
  <button onclick="checkCode()">Continue</button>
</div>

<!-- Экран регистрации ника -->
<div id="registerScreen" style="display:none">
  <p>Ваш ник</p>
  <input id="usernameInput">
  <br>
  <button onclick="enterChat()">Enter Chat</button>
</div>

<!-- Главный чат -->
<div id="chat">
  <h2 id="chatTitle">Общий чат</h2>
  <div id="onlineUsers"></div>
  <div id="messages"></div>
  <input id="messageInput" placeholder="Сообщение">
  <button onclick="sendMessage()">Send</button>
  <br><br>
  <span id="backToGeneral" class="chat-toggle" style="display:none;" onclick="backToGeneral()">← Вернуться в общий чат</span>
</div>

<!-- Звуковое уведомление -->
<audio id="notifSound" src="https://www.myinstants.com/media/sounds/notification.mp3" preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:"PASTE",
  authDomain:"PASTE",
  projectId:"PASTE",
  storageBucket:"PASTE",
  messagingSenderId:"PASTE",
  appId:"PASTE"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const secretCode = "MAGGY2026";
let username = localStorage.getItem("maggyUser")||"";
let onlineInterval;
let currentChat = null; // null = общий чат, иначе = ник другого пользователя
let lastMessageTime = 0;
let isTabActive = true;

// Проверка активности вкладки
document.addEventListener("visibilitychange", () => {
  isTabActive = !document.hidden;
});

if(username){
  document.getElementById("codeScreen").style.display="none";
  document.getElementById("chat").style.display="block";
  startChat();
}

function checkCode(){
  let code = document.getElementById("codeInput").value;
  if(code === secretCode){
    document.getElementById("codeScreen").style.display="none";
    document.getElementById("registerScreen").style.display="block";
  }else{
    alert("Wrong code");
  }
}

function enterChat(){
  username = document.getElementById("usernameInput").value.trim();
  if(!username){ alert("Введите ник"); return; }
  localStorage.setItem("maggyUser", username);
  document.getElementById("registerScreen").style.display="none";
  document.getElementById("chat").style.display="block";
  startChat();
}

function avatarLetter(name){ return name.charAt(0).toUpperCase(); }

function sendMessage(){
  let text = document.getElementById("messageInput").value.trim();
  if(!text) return;

  let recipient = currentChat || null;

  db.collection("messages").add({
    user: username,
    text: text,
    recipient: recipient,
    time: Date.now()
  });

  document.getElementById("messageInput").value="";
}

function startChat(){
  requestNotificationPermission();
  loadMessages();
  setOnline();
  watchOnline();
  onlineInterval = setInterval(setOnline, 15000);
}

function requestNotificationPermission(){
  if("Notification" in window){
    if(Notification.permission === "default"){
      Notification.requestPermission().then(permission => {
        console.log("Notification permission:", permission);
      });
    }
  }
}

function loadMessages(){
  db.collection("messages").orderBy("time")
  .onSnapshot(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      let m = doc.data();
      if(!m.recipient){ // общий чат
        if(currentChat === null){
          html += messageHtml(m);
          notifyNewMessage(m);
        }
      }else{ // личный чат
        if((m.user===username && m.recipient===currentChat) || (m.user===currentChat && m.recipient===username)){
          html += messageHtml(m,true);
          notifyNewMessage(m,true);
        }
      }
    });
    document.getElementById("messages").innerHTML = html;
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
  });
}

function messageHtml(m,isPrivate=false){
  return `
    <div class="message">
      <div class="avatar">${avatarLetter(m.user)}</div>
      <div>
        <span class="username">${m.user}</span>
        ${isPrivate ? `<i>(private)</i> ` : ""}${m.text}
      </div>
    </div>
  `;
}

function notifyNewMessage(m, isPrivate=false){
  if(m.user === username) return; // не уведомляем себя
  if(m.time <= lastMessageTime) return; // игнорируем старые сообщения
  lastMessageTime = m.time;

  // уведомление только если вкладка не активна
  if(!isTabActive && Notification.permission === "granted"){
    let title = isPrivate ? `Личный чат: ${m.user}` : `Новое сообщение от ${m.user}`;
    let options = {
      body: m.text,
      icon: "https://via.placeholder.com/32/ff4da6/ffffff?text=M"
    };
    new Notification(title, options);
  }

  // звук уведомления всегда
  const sound = document.getElementById("notifSound");
  sound.currentTime = 0;
  sound.play();
}

function setOnline(){
  db.collection("online").doc(username).set({
    name: username,
    time: Date.now()
  });
}

function watchOnline(){
  db.collection("online")
  .onSnapshot(snapshot=>{
    let users = [];
    let now = Date.now();
    snapshot.forEach(doc=>{
      let u = doc.data();
      if(now - u.time < 30000) users.push(u.name);
    });

    let html = "Online: ";
    users.forEach(u=>{
      html += `<span class="online-user">${u}`;
      if(u!==username){
        html += ` <span class="chat-toggle" onclick="startPrivateChat('${u}')">[Личный чат]</span>`;
      }
      html += `</span>`;
    });
    document.getElementById("onlineUsers").innerHTML = html;
  });
}

function startPrivateChat(otherUser){
  currentChat = otherUser;
  document.getElementById("chatTitle").innerText = `Личный чат с ${otherUser}`;
  document.getElementById("backToGeneral").style.display = "inline-block";
  loadMessages();
}

function backToGeneral(){
  currentChat = null;
  document.getElementById("chatTitle").innerText = "Общий чат";
  document.getElementById("backToGeneral").style.display = "none";
  loadMessages();
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
